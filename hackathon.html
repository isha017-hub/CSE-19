<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DecisionLens AI | Final Prototype</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background-color: #0f172a;
    color: white;
    font-family: sans-serif;
}

.gradient-card {
    background: linear-gradient(135deg, #1e293b, #0f172a);
    border: 1px solid #334155;
}

.loader {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #3b82f6;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body class="p-8">

<div class="max-w-4xl mx-auto">

<!-- INPUT SCREEN -->
<div id="input-screen" class="gradient-card p-8 rounded-2xl">
    <h1 class="text-3xl font-bold mb-2">DecisionLens AI</h1>
    <p class="text-gray-400 mb-6">Analyze messages for scam, financial & privacy risk</p>

    <textarea id="dataInput"
        class="w-full h-32 p-4 bg-slate-800 rounded-lg border border-slate-600"
        placeholder="Paste message / email / URL..."></textarea>

    <button onclick="startAnalysis()"
        class="mt-4 w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold">
        Analyze with AI
    </button>
</div>

<!-- LOADING -->
<div id="loading-screen" class="hidden text-center py-20">
    <div class="loader mx-auto mb-6"></div>
    <h2 class="text-2xl font-bold">Analyzing...</h2>
    <p id="loadingText" class="text-gray-400">Scanning input...</p>
</div>

<!-- RESULT -->
<div id="result-screen" class="hidden space-y-6">

    <div class="gradient-card p-6 rounded-2xl flex justify-between items-center">
        <div>
            <h2 class="text-2xl font-bold">Trust Score</h2>
            <p class="text-gray-400">AI safety evaluation</p>
        </div>

        <div id="trustScore" class="text-5xl font-extrabold text-blue-400">
            0<span class="text-2xl">/100</span>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div class="gradient-card p-4 rounded-xl">
            <p class="text-gray-400">Scam Probability</p>
            <p id="scamScore" class="text-xl font-bold text-red-400">0%</p>
        </div>

        <div class="gradient-card p-4 rounded-xl">
            <p class="text-gray-400">Financial Risk</p>
            <p id="financeScore" class="text-xl font-bold text-yellow-400">0%</p>
        </div>
    </div>

    <div class="gradient-card p-6 rounded-2xl">
        <h3 class="font-bold mb-2">AI Explanation</h3>
        <p id="aiExplanation" class="text-gray-300"></p>
    </div>

    <button onclick="location.reload()"
        class="bg-slate-700 px-6 py-2 rounded-lg">
        Analyze New
    </button>
</div>

</div>

<script>
function analyzeText(text) {
    text = text.toLowerCase();

    let scamKeywords = [
        "otp", "urgent", "click here", "verify", "lottery",
        "won", "bank", "account blocked", "free money"
    ];

    let financeKeywords = [
        "payment", "upi", "card", "loan", "transfer", "refund"
    ];

    let scamScore = 0;
    let financeRisk = 0;

    scamKeywords.forEach(word => {
        if (text.includes(word)) scamScore += 12;
    });

    financeKeywords.forEach(word => {
        if (text.includes(word)) financeRisk += 8;
    });

    scamScore = Math.min(100, scamScore);
    financeRisk = Math.min(100, financeRisk);

    let trustScore = 100 - (scamScore * 0.7 + financeRisk * 0.3);
    trustScore = Math.max(0, Math.round(trustScore));

    return { scamScore, financeRisk, trustScore };
}

function startAnalysis() {

    const input = document.getElementById("dataInput").value;

    if (!input.trim()) {
        alert("Please enter some text");
        return;
    }

    document.getElementById("input-screen").classList.add("hidden");
    document.getElementById("loading-screen").classList.remove("hidden");

    let messages = [
        "Scanning patterns...",
        "Detecting scam signals...",
        "Analyzing financial risk...",
        "Generating report..."
    ];

    let i = 0;
    let interval = setInterval(() => {
        document.getElementById("loadingText").innerText = messages[i];
        i++;
        if (i >= messages.length) clearInterval(interval);
    }, 700);

    setTimeout(() => {

        const result = analyzeText(input);

        document.getElementById("loading-screen").classList.add("hidden");
        document.getElementById("result-screen").classList.remove("hidden");

        document.getElementById("trustScore").innerHTML =
            result.trustScore + "<span class='text-2xl'>/100</span>";

        document.getElementById("scamScore").innerText =
            result.scamScore + "%";

        document.getElementById("financeScore").innerText =
            result.financeRisk + "%";

        let explanation = "";

        if (result.trustScore > 75) {
            explanation = "This content looks safe and trustworthy.";
        } 
        else if (result.trustScore > 50) {
            explanation = "Some suspicious patterns detected. Be cautious.";
        } 
        else {
            explanation = "High risk detected. Possible scam or phishing attempt.";
        }

        document.getElementById("aiExplanation").innerText = explanation;

    }, 3000);
}
</script>

</body>
</html>
